<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RTC Nomade</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<script>
    // Chargement ultra-rapide avant le rendu du reste
    const savedTop = localStorage.getItem('rtc-top-color');
    const savedBottom = localStorage.getItem('rtc-bottom-color');
    if (savedTop) document.documentElement.style.setProperty('--green-bubble', savedTop);
    // Note : Cela demande d'avoir défini --green-bubble dans votre style.css
</script>

<body>

    <div id="screen-ticket" class="app-screen active">
        <div class="bg-container">
            <div class="bg-pattern"></div>
        </div>

        <header class="header">
            <button class="back-btn" id="btn-to-settings">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
        </header>

        <section class="animation-zone">
            <div class="logo-outer-circle">
                <img src="DROMALOGOTRANS.png" class="droma-logo" alt="Logo">
                <div id="orbit-follower" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 9999;">
                    <div class="orbital-system" id="orbit-node">
                        <div class="bubble green"></div>
                        <div class="bubble brown"></div>
                    </div>
                    
                    <script>
    (function() {
        const savedTop = localStorage.getItem('rtc-top-color');
        const savedBottom = localStorage.getItem('rtc-bottom-color');
        const sheet = document.createElement('style');
        sheet.innerHTML = `
            .bubble.green { background-color: ${savedTop || '#00ff66'} !important; }
            .bubble.brown { background-color: ${savedBottom || '#381d18'} !important; }
        `;
        document.head.appendChild(sheet);
    })();
</script>

                </div>
            </div>
        </section>

        <main class="ticket-container">
            <div class="card-ticket main-card">
                <div class="header-ticket">
                    <div class="verif-badge">
                        <img src="1VERIFTRANS.png" alt="Badge">
                    </div>
                    <div class="ticket-title-wrapper">
                        <div class="ticket-title">RTC - 1 passage - Général</div>
                    </div>
                </div>
                
                <div class="validity-info">
                    <div class="dates">
                        <div class="date-label">Période de validité</div>
                        <div class="date-item text-black">
                            <img src="CONFIRMGRENTRANS.png" class="cal-icon" alt="Valid">
                            <span id="activation-date">--/--/---- à --:--</span>
                        </div>
                        <div class="date-item text-black expiration-style">
                            <img src="EXPIRELOGO.png" class="cal-icon" alt="Expire">
                            <span id="expiration-date">--/--/---- à --:--</span>
                        </div>
                    </div>
                    <div class="qr-box">
                        <img src="QRCODETRANS.png" alt="QR Code">
                    </div>
                </div>
            </div>

            <div class="card-ticket rtc-card">
                <div class="rtc-header-row">
                    <div class="rtc-timer-wrapper">
                        <div class="rtc-timer" id="timer-display">0:00</div>
                    </div>
                    <div class="rtc-title-wrapper-centered">
                        <div class="rtc-title">Réservé au RTC</div>
                    </div>
                </div>
                <div class="rtc-body">
                    <div class="rtc-date">
                        <img src="CONFIRMGRENTRANS.png" class="cal-icon" alt="Valid icon">
                        <span id="rtc-activation-date">--/--/---- à --:--</span>
                    </div>
                    <div class="rtc-serial" id="serial-display">1-XXXXXXXXXXXXX</div>
                </div>
            </div>

            <div class="progress-bar-container">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
        </main>
    </div>
    
    <div id="screen-settings" class="app-screen" style="background: white; padding: 20px; overflow-y: auto;">
    <div style="max-width: 400px; margin: 0 auto;">
        <div style="font-size: 20px; font-weight: bold; color: #023177; text-align: center; margin-bottom: 20px;">CONFIGURATION</div>
        <input type="file" id="image-upload" accept="image/*" style="width: 100%; margin-bottom: 15px;">
        
        <div id="preview-area" style="width: 100%; height: 200px; background: #eee; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 20px;">
            <img id="image-preview" style="max-width: 100%; max-height: 100%; display: none;">
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="btn-pipette-1" style="flex: 1; padding: 12px; background: #00ff66; border: none; border-radius: 8px; font-weight: bold;">Pipette Rond 1</button>
            <button id="btn-pipette-2" style="flex: 1; padding: 12px; background: #381d18; color: white; border: none; border-radius: 8px; font-weight: bold;">Pipette Rond 2</button>
        </div>
        <button id="btn-clear-cache" style="width: 100%; padding: 10px; background: #ff4d4d; color: white; border: none; border-radius: 8px; margin-bottom: 10px;">Vider le cache</button>  
        <button id="btn-back-to-ticket" style="width: 100%; padding: 15px; background: #023177; color: white; border: none; border-radius: 8px; font-weight: bold;">Confirmer et Retourner</button>
    </div>
</div>
<script>
    function formatTwoDigits(n) { return n < 10 ? '0' + n : n; }
    
    function formatAMPM(date) {
        let hours = date.getHours();
        let minutes = date.getMinutes();
        const ampm = hours >= 12 ? 'p.m.' : 'a.m.';
        hours = hours % 12;
        hours = hours ? hours : 12;
        return `${hours}:${formatTwoDigits(minutes)} ${ampm}`;
    }

    function generateRTCSerial() {
        const characters = '0123456789ABCDEF';
        let result = '1-';
        for (let i = 0; i < 13; i++) {
            result += characters.charAt(Math.floor(Math.random() * characters.length));
        }
        return result;
    }
    document.getElementById('serial-display').textContent = generateRTCSerial();

    const now = new Date();
    const expire = new Date(now.getTime() + 90 * 60 * 1000); 

    const dateStr = `${formatTwoDigits(now.getDate())}/${formatTwoDigits(now.getMonth() + 1)}/${now.getFullYear()}`;
    const timeStr = formatAMPM(now);
    const expireTimeStr = formatAMPM(expire);

    const fullActivation = `${dateStr} à ${timeStr}`;
    const fullExpiration = `${dateStr} à ${expireTimeStr}`;

    document.getElementById('activation-date').textContent = fullActivation;
    document.getElementById('rtc-activation-date').textContent = fullActivation;
    document.getElementById('expiration-date').textContent = fullExpiration;

    const startTime = now.getTime();
    const timerDisplay = document.getElementById('timer-display');
    const progressBar = document.getElementById('progress-bar');
    
    function updateTimeline() {
        const currentTime = new Date().getTime();
        const elapsedSeconds = Math.floor((currentTime - startTime) / 1000);
        const totalDuration = 90 * 60; 

        if (elapsedSeconds >= totalDuration) {
            timerDisplay.textContent = "90:00";
            progressBar.style.width = "100%";
            return;
        }

        let mins = Math.floor(elapsedSeconds / 60);
        let secs = elapsedSeconds % 60;
        timerDisplay.textContent = `${formatTwoDigits(mins)}:${formatTwoDigits(secs)}`;

        let percentage = 1 + (elapsedSeconds / totalDuration) * 99;
        progressBar.style.width = `${percentage}%`;
    }

    setInterval(updateTimeline, 1000);
    updateTimeline();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    const screenTicket = document.getElementById('screen-ticket');
    const screenSettings = document.getElementById('screen-settings');

    document.getElementById('btn-to-settings').addEventListener('click', (e) => {
        e.stopPropagation();
        screenTicket.classList.remove('active');
        screenSettings.classList.add('active');
    });

    // --- SYSTÈME DE SUIVI DE L'ORBITE ---
    const orbitFollower = document.getElementById('orbit-follower');
    const orbitNode = document.getElementById('orbit-node');
    let isTracking = false;

    function handlePointerDown(e) {
        if (!screenTicket.classList.contains('active') || e.target.closest('#btn-to-settings')) return;
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);

        if (clientX !== undefined && clientY !== undefined) {
            isTracking = true;
            orbitNode.classList.add('active-speed');
            orbitFollower.style.position = 'fixed';
            orbitFollower.style.width = '60px';
            orbitFollower.style.height = '60px';
            orbitFollower.style.transform = `translate3d(${clientX - 30}px, ${clientY - 30}px, 0)`;
        }
    }

    function handlePointerMove(e) {
        if (!isTracking) return;
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if (clientX !== undefined && clientY !== undefined) {
            orbitFollower.style.transform = `translate3d(${clientX - 30}px, ${clientY - 30}px, 0)`;
        }
    }

    function handlePointerUp() {
        if (isTracking) {
            isTracking = false;
            orbitNode.classList.remove('active-speed');
            orbitFollower.style.position = 'absolute';
            orbitFollower.style.width = '100%';
            orbitFollower.style.height = '100%';
            orbitFollower.style.transform = '';
        }
    }

    screenTicket.addEventListener('mousedown', handlePointerDown);
    window.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('mouseup', handlePointerUp);
    screenTicket.addEventListener('touchstart', handlePointerDown, { passive: true });
    window.addEventListener('touchmove', handlePointerMove, { passive: true });
    window.addEventListener('touchend', handlePointerUp);
    
    // --- PIPETTE ET GESTION DES COULEURS ---
    const imageUpload = document.getElementById('image-upload');
    const imagePreview = document.getElementById('image-preview');
    
    imageUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                imagePreview.src = event.target.result;
                imagePreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });

    // Fonction mise à jour pour modifier directement le DOM à la volée
    function updateColors(topColor, bottomColor) {
        // 1. On met à jour les variables root CSS
        document.documentElement.style.setProperty('--bubble-green', topColor);
        document.documentElement.style.setProperty('--bubble-brown', bottomColor);

        // 2. CORRECTION CRITIQUE : On force aussi les styles inline des bulles pour écraser le bloc de style injecté au milieu de la page
        const bubbleGreen = document.querySelector('.bubble.green');
        const bubbleBrown = document.querySelector('.bubble.brown');
        if (bubbleGreen) bubbleGreen.style.setProperty('background-color', topColor, 'important');
        if (bubbleBrown) bubbleBrown.style.setProperty('background-color', bottomColor, 'important');

        // 3. Sauvegarde locale
        localStorage.setItem('rtc-top-color', topColor);
        localStorage.setItem('rtc-bottom-color', bottomColor);
    }

    async function pickColor(targetId) {
        if (!window.EyeDropper) return;
        const eyeDropper = new EyeDropper();
        try {
            const result = await eyeDropper.open();
            const color = result.sRGBHex;

            if (targetId === 1) {
                updateColors(color, localStorage.getItem('rtc-bottom-color') || '#381d18');
                document.getElementById('btn-pipette-1').style.backgroundColor = color;
            } else {
                updateColors(localStorage.getItem('rtc-top-color') || '#00ff66', color);
                document.getElementById('btn-pipette-2').style.backgroundColor = color;
            }
        } catch (e) { console.log("Annulé"); }
    }

    function loadSavedButtons() {
        const savedTop = localStorage.getItem('rtc-top-color');
        const savedBottom = localStorage.getItem('rtc-bottom-color');
        if (savedTop) document.getElementById('btn-pipette-1').style.backgroundColor = savedTop;
        if (savedBottom) document.getElementById('btn-pipette-2').style.backgroundColor = savedBottom;
    }
    window.addEventListener('load', loadSavedButtons);

    // CORRECTION : Plus besoin de appyColorsLive(), on appelle updateColors() avec les données à jour
    document.getElementById('btn-back-to-ticket').addEventListener('click', () => {
        const topColor = localStorage.getItem('rtc-top-color') || '#00ff66';
        const bottomColor = localStorage.getItem('rtc-bottom-color') || '#381d18';

        // Applique les couleurs directement sans avoir besoin de rafraîchir
        updateColors(topColor, bottomColor);

        screenSettings.classList.remove('active');
        screenTicket.classList.add('active');
    });

    document.getElementById('btn-pipette-1').addEventListener('click', () => pickColor(1));
    document.getElementById('btn-pipette-2').addEventListener('click', () => pickColor(2));

    document.getElementById('btn-clear-cache').addEventListener('click', () => {
        if ('caches' in window) {
            caches.keys().then((keyList) => {
                return Promise.all(keyList.map((key) => {
                    return caches.delete(key);
                }));
            }).then(() => {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then((registrations) => {
                        for (let registration of registrations) {
                            registration.unregister();
                        }
                    });
                }
                localStorage.clear();
                alert('Le cache du Service Worker et les paramètres ont été réinitialisés !');
                window.location.reload();
            }).catch((err) => {
                alert('Erreur : ' + err);
            });
        } else {
            alert('Action non supportée par ce terminal.');
        }
    });
</script>
</body>
</html>
